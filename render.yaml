databases:
  - name: bianconerihub-n8n-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "17"

services:
  - type: web
    name: bianconerihub-n8n
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: n8n
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: N8N_HOST
        value: bianconerihub-n8n.onrender.com
      - key: WEBHOOK_URL
        value: https://bianconerihub-n8n.onrender.com/
      - key: N8N_EDITOR_BASE_URL
        value: https://bianconerihub-n8n.onrender.com/
      - key: N8N_PORT
        value: "5678"
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_SECURE_COOKIE
        value: "true"
      - key: GENERIC_TIMEZONE
        value: Europe/Rome
      - key: TZ
        value: Europe/Rome
      - key: N8N_RUNNERS_ENABLED
        value: "true"
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      - key: N8N_INSTAGRAM_WEBHOOK_SECRET
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        sync: false
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: bianconerihub-n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: bianconerihub-n8n-db
          property: port
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: bianconerihub-n8n-db
          property: database
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: bianconerihub-n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: bianconerihub-n8n-db
          property: password
      - key: DB_POSTGRESDB_SSL_ENABLED
        value: "true"
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false"
